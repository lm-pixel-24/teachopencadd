name: Talktorial Black Format Check

on:
  push:
    branches:
      - sepenv     
  pull_request:
    branches:
      - sepenv  

jobs:
  format:
    name: Black Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install format dependencies
        run: |
          python -m pip install --upgrade pip
          # Force the upgrade to a version that supports --jupyter
          pip install --upgrade "black[jupyter]>=24.0"

      #- name: Run Black Check
        #run: |
        #  black --jupyter -l 99 --check teachopencadd/talktorials/

      - name: Run Black Check
        run: |
          black --jupyter -l 99 --check teachopencadd/talktorials/T*/talktorial.ipynb

