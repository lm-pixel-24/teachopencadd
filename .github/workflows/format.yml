name: Talktorial Black Format Check

on:
  push:
    branches:
      - sepenv     
      - sepenv-ci
  pull_request:
    branches:
      - sepenv  
      - sepenv-ci

jobs:
  format:
    name: Black Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Install format dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade "black[jupyter]" --no-cache-dir

      - name: Run Black Check
        run: |
          python -m black --ipynb -l 99 --check teachopencadd/talktorials/T*/talktorial.ipynb

