name: Regenerate READMEs

on:
  push:
    paths:
      - "teachopencadd/talktorials/**/talktorial.ipynb"
  pull_request:
    paths:
      - "teachopencadd/talktorials/**/talktorial.ipynb"

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip bot commits
        if: github.actor == 'teachopencadd-readme-bot'
        run: |
          echo "Triggered by bot, skipping to avoid loop."
          exit 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install nbformat shyaml

      - name: Regenerate READMEs
        run: |
          for path in teachopencadd/talktorials/T*/talktorial.ipynb; do
            python devtools/regenerate_readmes.py --output README.md "$path"
          done

      - name: Commit changes if needed
        run: |
          git config user.name "teachopencadd-readme-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet; then
            git add teachopencadd/talktorials/T*/README.md
            git commit -m "Auto-update README.md files [skip ci]"

            git pull --rebase origin ${{ github.ref_name }}

            git push
          else
            echo "No changes to commit"
          fi
