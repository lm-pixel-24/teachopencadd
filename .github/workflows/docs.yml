name: Format, READMEs, and Deploy Docs

on:
  push:
    paths:
      - "teachopencadd/talktorials/**/talktorial.ipynb"
      - "docs/**"
      - "devtools/regenerate_readmes.py"
      - ".github/workflows/docs.yml"
      
  workflow_dispatch:
  schedule:
    - cron: "0 3/336 * * 1"

jobs:
  process-and-deploy:
    name: Format, README, and Deploy
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # --- Part 1: Formatting & READMEs ---
      
      - name: Format Notebooks and Regenerate READMEs
        run: |
          uv run --with "black[jupyter]" black --ipynb -l 99 teachopencadd/talktorials/T*/talktorial.ipynb
          
          for path in teachopencadd/talktorials/T*/talktorial.ipynb; do
            uv run --with nbformat python devtools/regenerate_readmes.py "$path" --output "README.md"
          done

      - name: Commit and Push Changes
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add teachopencadd/talktorials/T*/talktorial.ipynb
          git add teachopencadd/talktorials/T*/README.md
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-format notebooks and update READMEs [skip ci]"
            git push
          else
            echo "No changes detected."
          fi

      # --- Part 2: Build & Check Docs ---

      - name: Build Docs
        run: |
          uv run --group docs sphinx-build -b html docs docs/_build/html
        env:
          SPHINXOPTS: "-j2 -T --keep-going"

      - name: Restore Lychee Cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          args: >
            --accept '200..205, 403, 503, 504'
            --cache
            --insecure
            --no-progress
            --exclude-all-private
            --exclude "^file://.*"
            --exclude "http://localhost:.*"
            --exclude "http://127.0.0.1:.*"
            --exclude "local://.*"
            --exclude ".*\.mp4"
            --exclude ".*\.pdf"
            --exclude ".*\.png"
            --exclude ".*\.jpg"
            --exclude ".*\.py"
            --exclude "./**/*.md"
            "docs/_build/html/**/*.html" "README.md"

      - name: Log Results to Summary
        run: |
          if [ -f lychee/report.md ]; then
            echo "## Link Check Results" >> $GITHUB_STEP_SUMMARY
            cat lychee/report.md >> $GITHUB_STEP_SUMMARY
          fi

      # --- Part 3: Deploy ---

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
