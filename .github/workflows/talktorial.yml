name: Run Takltorial

on:
  push:
    branches:
      - sepenv     
  pull_request:
    branches:
      - sepenv  

jobs:
  run-main-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Conda
        run: |
          sudo apt-get update
          sudo apt-get install -y wget bzip2
          wget https://repo.anaconda.com/archive/Anaconda3-2024.06-1-Linux-x86_64.sh -O anaconda.sh
          bash anaconda.sh -b -p $HOME/anaconda
          echo "$HOME/anaconda/bin" >> $GITHUB_PATH
          source $HOME/anaconda/bin/activate

      - name: Check Python and Conda versions
        shell: bash -l {0}
        run: |
          which python
          python --version
          conda list

      - name: T001
        shell: bash -l {0}
        run: |
          conda activate base
          python main.py T001

      - name: T002
        shell: bash -l {0}
        if: false
        run: |
          conda activate base
          python main.py T002

      - name: T003
        shell: bash -l {0}
        if: false
        run: |
          conda activate base
          python main.py T003
