name: Talktorial CLI Cross-Platform

on:
  push:
    branches:
      - sepenv     
  pull_request:
    branches:
      - sepenv  

jobs:
  cli-scripts:
    name: ${{ matrix.talktorial }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60 # limit for the entire job (e.g., 15 minutes)
    strategy:
      fail-fast: false   # continue others even if one fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        talktorial:
          - T001 # long runtime.
          - T002
          - T003 
          - T004
          - T005
          - T006
          - T007
          - T008
          - T009
          - T010
          - T011
          - T012
          - T013
          - T014
          - T015
          - T016
          - T017
          - T018
          - T019
          - T020
          - T021
          - T022
          - T023
          - T024
          - T025
          - T026
          - T027
          - T028
          - T033
          - T034
          - T035
          - T036
          - T037
          - T038

        exclude:
          - talktorial: T034 # memory overload due to DL packages.
          - talktorial: T035 # memory overload due to DL packages.
          - talktorial: T036 # memory overload due to DL packages.
          - talktorial: T037 # memory overload due to DL packages.
          - talktorial: T038 # memory overload due to DL packages.
          - os: windows-latest
            talktorial: T019 # conda pkg issue on Windows.

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Clean disk space (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          echo "Cleaning disk space..."
          sudo apt-get clean
          echo "Disk space remaining after clean:"
          df -h

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3 
        with:
          miniconda-version: "latest"
          channels: defaults, conda-forge, bioconda
          auto-activate-base: true

      - name: Check Python, Conda and set up environment
        shell: bash -l {0}
        run: |
          which python
          python --version
          conda run pip install pytest nbval
          conda list

      - name: Talktorial ${{ matrix.talktorial}}
        shell: bash -l {0}
        run: |
          echo "Running ${{ matrix.talktorial }} on ${{runner.os}}"
          conda run --no-capture-output python main.py -t ${{ matrix.talktorial}} --test
