name: Talktorial CLI Cross-Platform

on:
  push:
    branches:
      - sepenv
  pull_request:
    branches:
      - sepenv

jobs:
  cli-scripts:
    name: ${{ matrix.talktorial }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        talktorial:
          - T001
          - T002
          - T003
          - T004
          - T005
          - T006
          - T007
          - T008
          - T009
          - T010
          - T011
          - T012
          - T013
          - T014
          - T015
          - T016
          - T017
          - T018
          - T019
          - T020
          - T021
          - T022
          - T023
          - T024
          - T025
          - T026
          - T027
          - T028
          - T033
          - T034
          - T035
          - T036
          - T037
          - T038

        exclude:
          - talktorial: T001
          - talktorial: T034
          - talktorial: T035
          - talktorial: T036
          - talktorial: T037
          - talktorial: T038
          - os: windows-latest
            talktorial: T008
          - os: windows-latest
            talktorial: T010
          - os: windows-latest
            talktorial: T015
          - os: windows-latest
            talktorial: T016
          - os: windows-latest
            talktorial: T019

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean disk space (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get clean
          df -h

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Sync uv environment
        run: uv sync --venv .venv --extras test

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: >
            uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          uv pip install -e .[test]

      - name: Run talktorial
        run: |
          echo "Running ${{ matrix.talktorial }} on ${{ runner.os }}"
          uv run teachopencadd -t ${{ matrix.talktorial }} --test
